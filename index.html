<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary — 10 Levels</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#e2e8f0;
    --muted:#94a3b8; --accent:#38bdf8; --done:#22c55e; --line:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
  }
  header{
    position:sticky; top:0; z-index:20; background:rgba(15,23,42,.95);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:14px 16px;
  }
  header h1{font-size:18px; font-weight:700}
  header p{font-size:12px; color:var(--muted); margin-top:2px}

  .levels{
    display:flex; gap:8px; overflow-x:auto; padding:10px 16px;
    border-bottom:1px solid var(--line); -webkit-overflow-scrolling:touch;
  }
  .lvl-btn{
    flex:0 0 auto; cursor:pointer; border:1px solid var(--line);
    background:var(--card); color:var(--text); border-radius:999px;
    padding:8px 14px; font-size:13px; font-weight:600; white-space:nowrap;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .lvl-btn small{font-size:10px; color:var(--muted); font-weight:500}
  .lvl-btn.active{background:var(--accent); color:#06283d; border-color:var(--accent)}
  .lvl-btn.active small{color:#06283d}

  .toolbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px;
  }
  .toolbar input[type=search]{
    flex:1; min-width:140px; background:var(--card); border:1px solid var(--line);
    color:var(--text); padding:9px 12px; border-radius:8px; font-size:14px;
  }
  .progress-wrap{flex-basis:100%; }
  .bar{height:8px; background:var(--card); border-radius:999px; overflow:hidden}
  .bar > span{display:block; height:100%; width:0; background:var(--done); transition:width .3s}
  .progress-txt{font-size:12px; color:var(--muted); margin-top:4px}
  .chip{
    cursor:pointer; font-size:12px; background:var(--card); border:1px solid var(--line);
    color:var(--muted); border-radius:8px; padding:8px 10px;
  }
  .chip.on{color:var(--accent); border-color:var(--accent)}

  main{padding:0 16px 60px; max-width:760px; margin:0 auto}
  .row{
    display:flex; align-items:flex-start; gap:12px; padding:12px;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    margin-bottom:8px; transition:opacity .2s;
  }
  .row.done{background:var(--card2); border-color:#14532d}
  .row.done .word{text-decoration:line-through; color:var(--muted)}
  .chk{
    flex:0 0 auto; width:26px; height:26px; border-radius:7px; cursor:pointer;
    border:2px solid var(--line); background:transparent; display:grid; place-items:center;
    margin-top:2px;
  }
  .row.done .chk{background:var(--done); border-color:var(--done)}
  .chk svg{width:16px; height:16px; opacity:0; }
  .row.done .chk svg{opacity:1}
  .info{flex:1; min-width:0}
  .word{font-size:16px; font-weight:700}
  .no{color:var(--muted); font-weight:500; font-size:13px; margin-right:6px}
  .type{
    display:inline-block; font-size:11px; color:var(--accent);
    background:rgba(56,189,248,.12); padding:1px 7px; border-radius:6px; margin-left:6px;
    vertical-align:middle;
  }
  .meaning{font-size:14px; color:var(--muted); margin-top:2px}
  .say{
    flex:0 0 auto; width:38px; height:38px; border-radius:10px; cursor:pointer;
    border:1px solid var(--line); background:var(--card2); color:var(--accent);
    display:grid; place-items:center; margin-top:2px;
  }
  .say:active{transform:scale(.92)}
  .say svg{width:20px; height:20px}
  .say.speaking{background:var(--accent); color:#06283d; border-color:var(--accent)}
  .empty{text-align:center; color:var(--muted); padding:40px 0}

  .daily{
    max-width:760px; margin:12px auto 0; background:var(--card);
    border:1px solid var(--line); border-radius:14px; padding:14px 16px;
  }
  .daily-row{display:flex; align-items:center; justify-content:space-between; gap:12px}
  .daily-big{font-size:22px; font-weight:800}
  .daily-big b{color:var(--done)}
  .daily-sub{font-size:12px; color:var(--muted); margin-top:2px}
  .target-set{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .target-set button{
    width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:18px;
    border:1px solid var(--line); background:var(--card2); color:var(--text); line-height:1;
  }
  .target-set input{
    width:46px; text-align:center; background:var(--bg); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:6px 0; font-size:15px; font-weight:700;
    -moz-appearance:textfield;
  }
  .target-set input::-webkit-outer-spin-button,
  .target-set input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .daily .bar{margin-top:12px}
  .daily-foot{font-size:11px; color:var(--muted); margin-top:8px}
  .goal-row{
    display:flex; align-items:center; flex-wrap:wrap; gap:6px;
    font-size:13px; color:var(--text); margin-top:12px;
    border-top:1px dashed var(--line); padding-top:12px;
  }
  .goal-row input{
    width:52px; text-align:center; background:var(--bg); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:5px 0; font-size:14px; font-weight:700;
    -moz-appearance:textfield;
  }
  .goal-row input::-webkit-outer-spin-button,
  .goal-row input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .goal-info{font-size:12px; color:var(--accent); flex-basis:100%}
  .goal-info.behind{color:#fbbf24}

  footer{text-align:center; font-size:11px; color:var(--muted); padding:20px}
</style>
</head>
<body>
<header>
  <h1>English Vocabulary — 10 Levels</h1>
  <p>3000 words · easy → hard · progress saved on this device</p>
</header>

<section class="daily">
  <div class="daily-row">
    <div>
      <div class="daily-big"><span id="todayCount">0</span> <span style="color:var(--muted);font-weight:600;font-size:16px">today</span></div>
      <div class="daily-sub"><span id="streak">🔥 0 days</span> · goal hit when bar is full</div>
    </div>
    <div class="target-set">
      <span>Daily<br>target</span>
      <button id="tMinus" title="Less">−</button>
      <input id="tInput" type="number" min="1" max="300" value="20">
      <button id="tPlus" title="More">+</button>
    </div>
  </div>
  <div class="bar"><span id="dayFill"></span></div>
  <div class="daily-foot" id="dailyFoot"></div>
  <div class="goal-row">
    🎯 Finish all 3000 in
    <input id="mInput" type="number" min="1" max="60" value="5"> months
    <span class="goal-info" id="goalInfo"></span>
  </div>
</section>

<nav class="levels" id="levels"></nav>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search word or meaning…">
  <button class="chip" id="hideDone">Hide done</button>
  <button class="chip" id="reset">Reset level</button>
  <div class="progress-wrap">
    <div class="bar"><span id="barFill"></span></div>
    <div class="progress-txt" id="progTxt"></div>
  </div>
</div>

<main id="list"></main>
<footer>Tip: tap the box to mark a word learned, or the 🔊 button to hear it. Your ticks stay saved in this browser.</footer>

<script>
const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#06283d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const SPEAKER_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';

function speak(text, btn){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.92;
  if(btn){
    btn.classList.add('speaking');
    u.onend = u.onerror = () => btn.classList.remove('speaking');
  }
  speechSynthesis.speak(u);
}
let DATA = {};
let current = Number(localStorage.getItem('vocab_level')) || 1;
let hideDone = false;

const $ = s => document.querySelector(s);

function dateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr(){ return dateStr(new Date()); }

function getTarget(){ return Math.max(1, Number(localStorage.getItem('vocab_target')) || 20); }
function setTarget(n){ localStorage.setItem('vocab_target', Math.min(300, Math.max(1, n))); }

function getMode(){ return localStorage.getItem('vocab_mode') || 'deadline'; }
function monthsFromNow(m){ const d = new Date(); d.setMonth(d.getMonth() + m); return dateStr(d); }
function getMonths(){ return Math.max(1, Number(localStorage.getItem('vocab_months')) || 5); }
function getDeadline(){
  let dl = localStorage.getItem('vocab_deadline');
  if(!dl){ dl = monthsFromNow(getMonths()); localStorage.setItem('vocab_deadline', dl); }
  return dl;
}
function daysUntil(dateString){
  const a = new Date(todayStr() + 'T00:00:00');
  const b = new Date(dateString + 'T00:00:00');
  return Math.max(1, Math.round((b - a) / 86400000));
}

function getDaily(){
  try { return JSON.parse(localStorage.getItem('vocab_daily') || '{}'); }
  catch(e){ return {}; }
}
function saveDaily(d){ localStorage.setItem('vocab_daily', JSON.stringify(d)); }

// log the date a word was learned (or remove it when un-ticked)
function recordToggle(lvl, no, isDone){
  const daily = getDaily();
  const key = lvl + '-' + no;
  for(const day in daily){
    const i = daily[day].indexOf(key);
    if(i > -1){ daily[day].splice(i,1); if(!daily[day].length) delete daily[day]; }
  }
  if(isDone){ (daily[todayStr()] = daily[todayStr()] || []).push(key); }
  saveDaily(daily);
}

function computeStreak(daily, target){
  let streak = 0;
  const d = new Date();
  if((daily[todayStr()] || []).length < target){ d.setDate(d.getDate()-1); }
  while((daily[dateStr(d)] || []).length >= target){
    streak++; d.setDate(d.getDate()-1);
  }
  return streak;
}

function fmtDate(s){
  return new Date(s + 'T00:00:00').toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
}

function renderDaily(){
  const daily = getDaily();
  const todayCount = (daily[todayStr()] || []).length;
  let total = 0; for(let i=1;i<=10;i++) total += getDone(i).size;
  const remaining = Math.max(0, 3000 - total);

  $('#mInput').value = getMonths();
  const info = $('#goalInfo');

  // In deadline mode, the per-day target auto-adjusts from words left and days left.
  if(getMode() === 'deadline'){
    const dl = getDeadline();
    const daysLeft = daysUntil(dl);
    const need = remaining === 0 ? 0 : Math.ceil(remaining / daysLeft);
    setTarget(need || 1);
    if(remaining === 0){
      info.textContent = '🎉 All 3000 words learned!';
      info.classList.remove('behind');
    } else {
      const behind = todayCount < need;
      info.textContent = '→ ' + need + ' words/day to finish by ' + fmtDate(dl) +
        ' (' + daysLeft + ' days, ' + remaining + ' left)';
      info.classList.toggle('behind', behind);
    }
  } else {
    info.textContent = 'Manual pace — ~' + Math.ceil(remaining / getTarget()) + ' days left at ' + getTarget() + '/day';
    info.classList.remove('behind');
  }

  const target = getTarget();
  $('#tInput').value = target;
  $('#todayCount').innerHTML = todayCount + ' / ' + target;
  $('#dayFill').style.width = Math.min(100, todayCount / target * 100) + '%';
  const s = computeStreak(daily, target);
  $('#streak').textContent = '🔥 ' + s + ' day streak';
  $('#dailyFoot').textContent = todayCount >= target
    ? '✅ Target reached today! ' + total + ' / 3000 learned overall.'
    : total + ' / 3000 learned overall';
}

function doneKey(lvl){ return 'vocab_done_' + lvl; }
function getDone(lvl){
  try { return new Set(JSON.parse(localStorage.getItem(doneKey(lvl)) || '[]')); }
  catch(e){ return new Set(); }
}
function saveDone(lvl, set){
  localStorage.setItem(doneKey(lvl), JSON.stringify([...set]));
}

function buildLevels(){
  const nav = $('#levels');
  nav.innerHTML = '';
  for(let i=1;i<=10;i++){
    const done = getDone(i).size;
    const b = document.createElement('button');
    b.className = 'lvl-btn' + (i===current ? ' active':'');
    b.innerHTML = 'Level ' + i + '<small>' + done + '/300</small>';
    b.onclick = () => { current = i; localStorage.setItem('vocab_level', i); render(); };
    nav.appendChild(b);
  }
}

function render(){
  buildLevels();
  const words = DATA[current] || [];
  const done = getDone(current);
  const q = $('#search').value.trim().toLowerCase();
  const list = $('#list');
  list.innerHTML = '';

  let shown = 0;
  words.forEach(w => {
    if(hideDone && done.has(w.no)) return;
    if(q && !(w.word.toLowerCase().includes(q) || (w.meaning||'').toLowerCase().includes(q))) return;
    shown++;
    const row = document.createElement('div');
    row.className = 'row' + (done.has(w.no) ? ' done':'');
    row.innerHTML =
      '<div class="chk">'+CHECK_SVG+'</div>' +
      '<div class="info">' +
        '<div><span class="no">'+w.no+'.</span><span class="word">'+w.word+'</span>' +
        (w.type?'<span class="type">'+w.type+'</span>':'') + '</div>' +
        '<div class="meaning">'+(w.meaning||'')+'</div>' +
      '</div>' +
      '<button class="say" title="Pronounce">'+SPEAKER_SVG+'</button>';
    row.querySelector('.chk').onclick = () => {
      const nowDone = !done.has(w.no);
      if(nowDone) done.add(w.no); else done.delete(w.no);
      saveDone(current, done);
      recordToggle(current, w.no, nowDone);
      render();
    };
    row.querySelector('.say').onclick = (e) => { e.stopPropagation(); speak(w.word, e.currentTarget); };
    list.appendChild(row);
  });

  if(shown===0){
    list.innerHTML = '<div class="empty">No words match.</div>';
  }

  const total = words.length;
  const d = done.size;
  $('#barFill').style.width = total ? (d/total*100)+'%' : '0';
  $('#progTxt').textContent = d + ' / ' + total + ' learned in Level ' + current +
    '  (' + (total?Math.round(d/total*100):0) + '%)';
  renderDaily();
}

// Manual override: tweaking the number switches off deadline auto-pacing.
function changeTarget(n){
  localStorage.setItem('vocab_mode', 'manual');
  setTarget(n); renderDaily();
}
$('#tPlus').onclick  = () => changeTarget(getTarget() + 5);
$('#tMinus').onclick = () => changeTarget(getTarget() - 5);
$('#tInput').onchange = function(){ changeTarget(Number(this.value)); };

// Setting a finish deadline turns auto-pacing back on.
$('#mInput').onchange = function(){
  const m = Math.min(60, Math.max(1, Number(this.value) || 5));
  localStorage.setItem('vocab_mode', 'deadline');
  localStorage.setItem('vocab_months', m);
  localStorage.setItem('vocab_deadline', monthsFromNow(m));
  renderDaily();
};

$('#search').addEventListener('input', render);
$('#hideDone').onclick = function(){
  hideDone = !hideDone; this.classList.toggle('on', hideDone); render();
};
$('#reset').onclick = function(){
  if(confirm('Reset all ticks in Level ' + current + '?')){
    localStorage.removeItem(doneKey(current)); render();
  }
};

fetch('vocab.json')
  .then(r => r.json())
  .then(d => { DATA = d; render(); })
  .catch(err => {
    $('#list').innerHTML = '<div class="empty">Could not load vocab.json.<br>' +
      'Run this site through a local server (see note below), not by double-clicking the file.</div>';
  });
</script>
</body>
</html>
